<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dev Draft POS – Grocery Point of Sale</title>
    <script src="react.production.min.js"></script>
    <script src="react-dom.production.min.js"></script>
    <script src="babel.min.js"></script>
    <script src="xlsx.full.min.js"></script>
    <!-- Tamil font via system (Latha on Windows) -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f7f5;
        }

        input,
        select,
        button {
            font-family: inherit;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #e8f5ed;
        }

        ::-webkit-scrollbar-thumb {
            background: #1a7a3c;
            border-radius: 3px;
        }

        /* Receipt prints via new popup window — no @media print needed on main page */
        #print-receipt {
            display: none;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* ════════════════════════════════════════════════════════════════
           58mm THERMAL RECEIPT — English only, perfect alignment
           Paper  : 58mm  |  96dpi px = 219px
           Padding: 3mm L+R  →  usable = 52mm ≈ 196px
           RIGHT COL: all tables share exactly 46px  (items TOTAL,
                      Sub Total, GST, NET PAYABLE, Cash, Change)
        ════════════════════════════════════════════════════════════════ */

        /* ── OUTER WRAPPER ── */
        .rcp {
            font-family: 'Courier New', Courier, monospace;
            font-size: 9.5px;
            line-height: 1.45;
            width: 58mm;
            max-width: 58mm;
            padding: 3mm 3mm 8mm 3mm;
            box-sizing: border-box;
            background: #fff;
            color: #000;
            overflow: hidden;
            word-break: break-word;
            border: 1.5px dashed #555;
        }

        /* ── HEADER ── */
        .rcp-shopname {
            display: block;
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 13px;
            font-weight: 900;
            text-align: center;
            letter-spacing: 0.3px;
            line-height: 1.25;
        }

        .rcp-tagline {
            display: block;
            font-size: 8px;
            text-align: center;
            line-height: 1.55;
            color: #333;
        }

        .rcp-sub {
            display: block;
            font-size: 8px;
            text-align: center;
            line-height: 1.5;
            color: #000;
        }

        .rcp-title {
            display: block;
            font-size: 10px;
            font-weight: 900;
            text-align: center;
            letter-spacing: 2px;
            margin: 2px 0;
        }

        /* ── SEPARATORS ── */
        .rcp-dash {
            border: none;
            border-top: 1px dashed #666;
            margin: 3px 0;
        }

        .rcp-thin {
            border: none;
            border-top: 1px solid #000;
            margin: 2px 0;
        }

        .rcp-solid {
            border: none;
            border-top: 2px solid #000;
            margin: 2px 0;
        }

        /* ── BILL META: 2-col, date-left / time-right ── */
        .t-meta {
            width: 100%;
            border-collapse: collapse;
            font-size: 8px;
            line-height: 1.65;
            table-layout: fixed;
        }

        .t-meta col.ml {
            width: auto;
        }

        .t-meta col.mr {
            width: 70px;
        }

        .t-meta td {
            padding: 0;
            vertical-align: top;
        }

        .t-meta td.r {
            text-align: right;
            white-space: nowrap;
        }

        /* ── ITEMS TABLE ─────────────────────────────────────────────
           4 columns — widths calibrated for 196px usable:
             ITEM : auto   (fills remaining ~94px)
             QTY  : 16px
             RATE : 40px
             TOTAL: 46px   ← must match all amount cols below
           All right-aligned cells flush with 1px right pad
        ──────────────────────────────────────────────────────────── */
        .t-items {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .t-items col.ci {
            width: auto;
        }

        .t-items col.cq {
            width: 16px;
        }

        .t-items col.cr {
            width: 40px;
        }

        .t-items col.ct {
            width: 46px;
        }

        .t-items .hdr th {
            font-size: 8.5px;
            font-weight: 900;
            letter-spacing: 0.5px;
            padding: 2px 0 2px 0;
            text-transform: uppercase;
            vertical-align: bottom;
        }

        .t-items .hdr th.ci {
            text-align: left;
        }

        .t-items .hdr th.cq {
            text-align: right;
            padding-right: 1px;
        }

        .t-items .hdr th.cr {
            text-align: right;
            padding-right: 1px;
        }

        .t-items .hdr th.ct {
            text-align: right;
            padding-right: 0;
        }

        .t-items .irow td {
            padding: 2px 0 2px 0;
            vertical-align: top;
        }

        .t-items .irow td.cq {
            text-align: right;
            padding-right: 1px;
            white-space: nowrap;
        }

        .t-items .irow td.cr {
            text-align: right;
            padding-right: 1px;
            white-space: nowrap;
            font-size: 8.5px;
        }

        .t-items .irow td.ct {
            text-align: right;
            padding-right: 0;
            white-space: nowrap;
            font-size: 8.5px;
            font-weight: 700;
        }

        .i-name {
            display: block;
            font-size: 8.5px;
            font-weight: 700;
            line-height: 1.35;
        }

        .i-uom {
            display: block;
            font-size: 7.5px;
            color: #555;
            line-height: 1.3;
        }

        /* ── TOTALS: 2-col, right col = 46px (same as items TOTAL) ── */
        .t-totals {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .t-totals col.tl {
            width: auto;
        }

        .t-totals col.ta {
            width: 46px;
        }

        .t-totals td {
            padding: 1px 0;
            font-size: 8.5px;
            line-height: 1.55;
            vertical-align: middle;
        }

        .t-totals td.ta {
            text-align: right;
            white-space: nowrap;
            padding-right: 0;
        }

        .t-totals tr.dim td {
            color: #555;
        }

        /* ── NET PAYABLE: bold large ── */
        .t-net {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .t-net col.nl {
            width: auto;
        }

        .t-net col.na {
            width: 46px;
        }

        .t-net td {
            padding: 3px 0 2px;
            font-size: 11px;
            font-weight: 900;
            vertical-align: middle;
            line-height: 1.3;
        }

        .t-net td.na {
            text-align: right;
            white-space: nowrap;
            padding-right: 0;
        }

        /* ── CASH / CHANGE ── */
        .t-cash {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .t-cash col.cl {
            width: auto;
        }

        .t-cash col.ca {
            width: 46px;
        }

        .t-cash td {
            padding: 1px 0;
            font-size: 8.5px;
            line-height: 1.55;
            vertical-align: middle;
        }

        .t-cash td.ca {
            text-align: right;
            white-space: nowrap;
            padding-right: 0;
        }

        .t-cash tr.chng td {
            font-weight: 700;
        }

        /* ── FOOTER ── */
        .rcp-footer-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 5px;
        }

        .rcp-footer-left {
            flex: 1;
            min-width: 0;
        }

        .rcp-thanks {
            display: block;
            font-size: 9.5px;
            font-weight: 700;
            line-height: 1.5;
        }

        .rcp-foot {
            display: block;
            font-size: 7.5px;
            color: #333;
            line-height: 1.5;
        }

        .rcp-barcode-area {
            text-align: center;
            flex-shrink: 0;
            margin-left: 4px;
        }

        .rcp-barcode-label {
            font-size: 7px;
            text-align: center;
            color: #333;
            margin-top: 1px;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ─── COLORS ───────────────────────────────────────────────────────────────────
        const C = {
            green: "#1a7a3c", greenDark: "#155f2e", greenLight: "#e8f5ed", greenMid: "#2d9d5c",
            white: "#ffffff", offWhite: "#f4f7f5", border: "#c8ddd0", borderDark: "#a0bfab",
            text: "#1a2e22", textMid: "#3d5247", textLight: "#6b8c7a",
            yellow: "#d97706", red: "#dc2626", blue: "#1d6fb8", purple: "#7c3aed",
        };

        // ─── INITIAL DATA ─────────────────────────────────────────────────────────────
        const INITIAL_SETTINGS = {
            shopName: "Vetri Grocery", address: "Villupuram",
            phone: "9876543210", gstNo: "GST33ABCDE1234F1Z5", fssaiNo: "10016011003582", currency: "₹", taxRate: 5,
        };
        // ── Super Admin credentials are FIXED and cannot be changed ──────────────
        const SUPER_ADMIN_USER = { id: 1, name: "Super Admin", username: "Devdraft", password: "sparthans08", role: "superadmin", email: "superadmin@devdraft.com", active: true };
        const INITIAL_USERS = [ SUPER_ADMIN_USER ];

        ];
        const SAMPLE_PRODUCTS = [
            { id: 1, code: "PRD001", name: "Rice", nameTamil: "அரிசி", brand: "Ponni", category: "Grains & Pulses", uom: "kg", stock: 50, costPrice: 45, salePrice: 50, taxRate: 0, minStock: 5 },
            { id: 2, code: "PRD002", name: "Toor Dal", nameTamil: "துவரம் பருப்பு", brand: "Local", category: "Grains & Pulses", uom: "kg", stock: 20, costPrice: 100, salePrice: 110, taxRate: 5, minStock: 3 },
            { id: 3, code: "PRD003", name: "Coconut Oil", nameTamil: "தேங்காய் எண்ணெய்", brand: "KLF", category: "Spices", uom: "litre", stock: 15, costPrice: 170, salePrice: 185, taxRate: 5, minStock: 2 },
            { id: 4, code: "PRD004", name: "Turmeric", nameTamil: "மஞ்சள்", brand: "MDH", category: "Spices", uom: "g", stock: 500, costPrice: 12, salePrice: 15, taxRate: 5, minStock: 50 },
            { id: 5, code: "PRD005", name: "Sugar", nameTamil: "சர்க்கரை", brand: "Local", category: "Grains & Pulses", uom: "kg", stock: 30, costPrice: 38, salePrice: 42, taxRate: 0, minStock: 5 },
            { id: 6, code: "PRD006", name: "Salt", nameTamil: "உப்பு", brand: "Tata", category: "Spices", uom: "kg", stock: 25, costPrice: 18, salePrice: 22, taxRate: 0, minStock: 5 },
            { id: 7, code: "PRD007", name: "Onion", nameTamil: "வெங்காயம்", brand: "Fresh", category: "Vegetables", uom: "kg", stock: 40, costPrice: 25, salePrice: 30, taxRate: 0, minStock: 5 },
            { id: 8, code: "PRD008", name: "Tomato", nameTamil: "தக்காளி", brand: "Fresh", category: "Vegetables", uom: "kg", stock: 20, costPrice: 20, salePrice: 25, taxRate: 0, minStock: 3 },
        ];

        function generateBillNo() {
            const count = parseInt(localStorage.getItem('vsp_bill_count') || '0') + 1;
            localStorage.setItem('vsp_bill_count', count);
            return 'VSP' + String(count).padStart(4, '0');
        }
        function today() { return new Date().toLocaleDateString("en-GB"); }
        function timeNow() { return new Date().toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" }); }

        // ─── EXCEL EXPORT HELPERS ─────────────────────────────────────────────────────
        function styleHeader(ws, headerRow, colCount) {
            for (let c = 0; c < colCount; c++) {
                const cell = ws[XLSX.utils.encode_cell({ r: headerRow, c })];
                if (cell) {
                    cell.s = {
                        font: { bold: true, color: { rgb: "FFFFFF" }, sz: 11 },
                        fill: { fgColor: { rgb: "1A7A3C" } },
                        alignment: { horizontal: "center", vertical: "center", wrapText: true },
                        border: { bottom: { style: "thin", color: { rgb: "FFFFFF" } } }
                    };
                }
            }
        }
        function autoWidth(ws, data) {
            if (!data || data.length === 0) return;
            const cols = Object.keys(data[0]).map((k, i) => ({
                wch: Math.max(k.length, ...data.map(r => String(Object.values(r)[i] ?? "").length)) + 2
            }));
            ws['!cols'] = cols;
        }
        // Build one row per bill-item — all bill header fields + item fields merged
        function buildFullBillRows(bills) {
            const rows = [];
            bills.forEach(b => {
                b.items.forEach(item => {
                    rows.push({
                        "Bill No":             b.billNo,
                        "Date":                b.date,
                        "Time":                b.time,
                        "Customer":            b.customer   || "Walk-in",
                        "Mobile":              b.mobile     || "",
                        "Area":                b.area       || "",
                        "Pay Mode":            b.paymode,
                        "Bill Type":           b.billType   || "Retail",
                        "Cashier":             b.cashier,
                        "Sl#":                 item.slNo,
                        "Product Code":        item.code,
                        "Item Name (English)": item.name,
                        "Item Name (Tamil)":   item.nameTamil || "",
                        "Brand":               item.brand   || "",
                        "UOM":                 item.uom,
                        "Qty":                 item.qty,
                        "Rate (INR)":          parseFloat(item.rate.toFixed(2)),
                        "Amount (INR)":        parseFloat(item.amount.toFixed(2)),
                        "Bill Total (INR)":    parseFloat(b.total.toFixed(2)),
                    });
                });
            });
            return rows;
        }

        // 1. ALL BILLS COMBINED
        function exportAllBillsCombined(bills) {
            if (!bills || bills.length === 0) { alert("No bills to export!"); return; }
            const wb = XLSX.utils.book_new();
            const full = buildFullBillRows(bills);
            const wsAll = XLSX.utils.json_to_sheet(full);
            styleHeader(wsAll, 0, Object.keys(full[0]).length);
            autoWidth(wsAll, full);
            XLSX.utils.book_append_sheet(wb, wsAll, "All Bills + Items");
            const summary = bills.map(b => ({
                "Bill No": b.billNo, "Date": b.date, "Time": b.time,
                "Customer": b.customer || "Walk-in", "Mobile": b.mobile || "",
                "Area": b.area || "", "Pay Mode": b.paymode, "Bill Type": b.billType || "Retail",
                "Items Count": b.items.length,
                "Item Names (EN)": b.items.map(i => i.name).join(", "),
                "Item Names (Tamil)": b.items.map(i => i.nameTamil || "").filter(Boolean).join(", "),
                "Total (INR)": parseFloat(b.total.toFixed(2)), "Cashier": b.cashier,
            }));
            const wsSumm = XLSX.utils.json_to_sheet(summary);
            styleHeader(wsSumm, 0, Object.keys(summary[0]).length);
            autoWidth(wsSumm, summary);
            XLSX.utils.book_append_sheet(wb, wsSumm, "Bill Summary");
            const dayMap = {};
            bills.forEach(b => {
                dayMap[b.date] = dayMap[b.date] || { count: 0, revenue: 0, items: 0 };
                dayMap[b.date].count++;
                dayMap[b.date].revenue += b.total;
                dayMap[b.date].items += b.items.length;
            });
            const daily = Object.entries(dayMap).map(([d, v]) => ({
                "Date": d, "Bills": v.count, "Total Items Sold": v.items,
                "Revenue (INR)": parseFloat(v.revenue.toFixed(2)),
                "Avg Bill (INR)": parseFloat((v.revenue / v.count).toFixed(2)),
            }));
            const wsDay = XLSX.utils.json_to_sheet(daily);
            styleHeader(wsDay, 0, Object.keys(daily[0]).length);
            autoWidth(wsDay, daily);
            XLSX.utils.book_append_sheet(wb, wsDay, "Daily Summary");
            XLSX.writeFile(wb, "All_Bills_" + today().replace(/\//g,'-') + ".xlsx");
        }

        // 2. DAILY AUTO-SAVE
        function saveDailyBillsExcel(allBills) {
            const todayBills = allBills.filter(b => b.date === today());
            if (todayBills.length === 0) return;
            const wb = XLSX.utils.book_new();
            const full = buildFullBillRows(todayBills);
            const wsAll = XLSX.utils.json_to_sheet(full);
            styleHeader(wsAll, 0, Object.keys(full[0]).length);
            autoWidth(wsAll, full);
            XLSX.utils.book_append_sheet(wb, wsAll, "Bills + Items Today");
            const summary = todayBills.map(b => ({
                "Bill No": b.billNo, "Time": b.time,
                "Customer": b.customer || "Walk-in", "Mobile": b.mobile || "",
                "Pay Mode": b.paymode, "Items Count": b.items.length,
                "Item Names (EN)": b.items.map(i => i.name).join(", "),
                "Item Names (Tamil)": b.items.map(i => i.nameTamil || "").filter(Boolean).join(", "),
                "Total (INR)": parseFloat(b.total.toFixed(2)), "Cashier": b.cashier,
            }));
            const wsSumm = XLSX.utils.json_to_sheet(summary);
            styleHeader(wsSumm, 0, Object.keys(summary[0]).length);
            autoWidth(wsSumm, summary);
            XLSX.utils.book_append_sheet(wb, wsSumm, "Bill Summary");
            const total = todayBills.reduce((s, b) => s + b.total, 0);
            const byPay = {};
            todayBills.forEach(b => { byPay[b.paymode] = (byPay[b.paymode] || 0) + b.total; });
            const stats = [
                { "Metric": "Date", "Value": today() },
                { "Metric": "Total Bills", "Value": todayBills.length },
                { "Metric": "Total Items Sold", "Value": todayBills.reduce((s,b)=>s+b.items.length,0) },
                { "Metric": "Total Revenue (INR)", "Value": parseFloat(total.toFixed(2)) },
                { "Metric": "Avg Bill (INR)", "Value": parseFloat((total/todayBills.length).toFixed(2)) },
                ...Object.entries(byPay).map(([m,a])=>({ "Metric": m+" (INR)", "Value": parseFloat(a.toFixed(2)) }))
            ];
            const wsStat = XLSX.utils.json_to_sheet(stats);
            styleHeader(wsStat, 0, 2);
            wsStat['!cols'] = [{ wch: 28 }, { wch: 18 }];
            XLSX.utils.book_append_sheet(wb, wsStat, "Day Summary");
            XLSX.writeFile(wb, "Bills_" + today().replace(/\//g,'-') + ".xlsx");
        }

        // 3. INVENTORY
        function exportInventoryToExcel(products) {
            const wb = XLSX.utils.book_new();
            const data = products.map(p => ({
                "Product Code": p.code, "Name (English)": p.name, "Name (Tamil)": p.nameTamil || "",
                "Brand": p.brand || "", "Category": p.category || "", "UOM": p.uom,
                "Current Stock": p.stock, "Min Stock": p.minStock,
                "Cost Price (INR)": p.costPrice, "Sale Price (INR)": p.salePrice,
                "Tax Rate (%)": p.taxRate,
                "Stock Value (INR)": parseFloat((p.stock * p.costPrice).toFixed(2)),
                "Status": p.stock <= p.minStock ? "LOW STOCK" : "OK",
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            styleHeader(ws, 0, Object.keys(data[0]).length);
            autoWidth(ws, data);
            XLSX.utils.book_append_sheet(wb, ws, "Inventory");
            XLSX.writeFile(wb, "Inventory_" + today().replace(/\//g,'-') + ".xlsx");
        }

        // 4. STOCK
        function exportStockToExcel(products, log) {
            const wb = XLSX.utils.book_new();
            const stockData = products.map(p => ({
                "Product Code": p.code, "Name (English)": p.name, "Name (Tamil)": p.nameTamil || "",
                "Brand": p.brand || "", "UOM": p.uom,
                "Current Stock": p.stock, "Min Stock": p.minStock,
                "Status": p.stock <= p.minStock ? "LOW" : "OK",
                "Stock Value (INR)": parseFloat((p.stock * p.costPrice).toFixed(2)),
            }));
            const wsStock = XLSX.utils.json_to_sheet(stockData);
            styleHeader(wsStock, 0, Object.keys(stockData[0]).length);
            autoWidth(wsStock, stockData);
            XLSX.utils.book_append_sheet(wb, wsStock, "Current Stock");
            if (log && log.length > 0) {
                const logData = log.map(l => ({
                    "Time": l.time, "Product (English)": l.productName, "Product (Tamil)": l.productNameTamil || "",
                    "Type": l.type === "IN" ? "Stock IN (+)" : "Stock OUT (-)",
                    "Quantity": l.qty, "Note": l.note || "",
                }));
                const wsLog = XLSX.utils.json_to_sheet(logData);
                styleHeader(wsLog, 0, Object.keys(logData[0]).length);
                autoWidth(wsLog, logData);
                XLSX.utils.book_append_sheet(wb, wsLog, "Adjustment Log");
            }
            XLSX.writeFile(wb, "Stock_" + today().replace(/\//g,'-') + ".xlsx");
        }

        // 5. REPORTS
        function exportReportsToExcel(bills) {
            if (!bills || bills.length === 0) { alert("No data!"); return; }
            const wb = XLSX.utils.book_new();
            const prodMap = {};
            bills.forEach(b => b.items.forEach(i => {
                prodMap[i.code] = prodMap[i.code] || { name: i.name, nameTamil: i.nameTamil || "", brand: i.brand || "", qty: 0, revenue: 0 };
                prodMap[i.code].qty += i.qty;
                prodMap[i.code].revenue += i.amount;
            }));
            const topProds = Object.entries(prodMap).sort((a,b)=>b[1].revenue-a[1].revenue).map(([code,v])=>({
                "Product Code": code, "Item Name (English)": v.name, "Item Name (Tamil)": v.nameTamil,
                "Brand": v.brand, "Total Qty Sold": v.qty, "Total Revenue (INR)": parseFloat(v.revenue.toFixed(2)),
            }));
            if (topProds.length > 0) {
                const wsProd = XLSX.utils.json_to_sheet(topProds);
                styleHeader(wsProd, 0, Object.keys(topProds[0]).length);
                autoWidth(wsProd, topProds);
                XLSX.utils.book_append_sheet(wb, wsProd, "Top Items");
            }
            const payMap = {};
            const totalRev = bills.reduce((s,b)=>s+b.total,0);
            bills.forEach(b => { payMap[b.paymode] = (payMap[b.paymode] || 0) + b.total; });
            const payData = Object.entries(payMap).map(([mode,amt])=>({
                "Payment Mode": mode, "Total Amount (INR)": parseFloat(amt.toFixed(2)),
                "% of Revenue": parseFloat(((amt/totalRev)*100).toFixed(1)),
            }));
            const wsPay = XLSX.utils.json_to_sheet(payData);
            styleHeader(wsPay, 0, Object.keys(payData[0]).length);
            autoWidth(wsPay, payData);
            XLSX.utils.book_append_sheet(wb, wsPay, "Payment Summary");
            const dayMap = {};
            bills.forEach(b => {
                dayMap[b.date] = dayMap[b.date] || { bills: 0, revenue: 0 };
                dayMap[b.date].bills++;
                dayMap[b.date].revenue += b.total;
            });
            const dailyData = Object.entries(dayMap).map(([date,v])=>({
                "Date": date, "No. of Bills": v.bills,
                "Total Revenue (INR)": parseFloat(v.revenue.toFixed(2)),
                "Avg Bill (INR)": parseFloat((v.revenue/v.bills).toFixed(2)),
            }));
            const wsDaily = XLSX.utils.json_to_sheet(dailyData);
            styleHeader(wsDaily, 0, Object.keys(dailyData[0]).length);
            autoWidth(wsDaily, dailyData);
            XLSX.utils.book_append_sheet(wb, wsDaily, "Daily Summary");
            XLSX.writeFile(wb, "Reports_" + today().replace(/\//g,'-') + ".xlsx");
        }

            XLSX.utils.book_append_sheet(wb, ws, "Product Dictionary");
            XLSX.writeFile(wb, "Product_Dictionary_" + today().replace(/\//g,'-') + ".xlsx");

        // 7. MASTER ALL-IN-ONE
        function exportMasterExcel(bills, products) {

        // ─── DAILY BILLS SCREEN ───────────────────────────────────────────────────────
        function DailyBillsScreen({ bills, settings }) {
            const { useState: uS } = React;
            const [selDate, setSelDate] = uS(today());
            const [downloaded, setDownloaded] = uS(false);

            // All unique dates that have bills
            const dates = [...new Set(bills.map(b => b.date))].sort().reverse();
            const filtered = bills.filter(b => b.date === selDate);

            // Build ONE ROW PER BILL — all items packed into a single cell each
            function buildRows(billList) {
                return billList.map((b, idx) => ({
                    "S.No":              idx + 1,
                    "Bill No":           b.billNo,
                    "Date":              b.date,
                    "Time":              b.time,
                    "Customer":          b.customer  || "Walk-in",
                    "Mobile":            b.mobile    || "",
                    "Area":              b.area      || "",
                    "Pay Mode":          b.paymode,
                    "Bill Type":         b.billType  || "Retail",
                    "No. of Items":      b.items.length,
                    "Items (English)":   b.items.map(i => i.name + " x" + i.qty).join(", "),
                    "Items (Tamil)":     b.items.map(i => (i.nameTamil || i.name) + " x" + i.qty).join(", "),
                    "Total (INR)":       parseFloat(b.total.toFixed(2)),
                    "Cashier":           b.cashier,
                }));
            }

            function downloadExcel() {
                if (filtered.length === 0) return;
                const wb = XLSX.utils.book_new();

                // Sheet 1: One row per bill
                const rows = buildRows(filtered);
                const ws = XLSX.utils.json_to_sheet(rows);
                // Green header
                const cols = Object.keys(rows[0]);
                cols.forEach((_, c) => {
                    const cell = ws[XLSX.utils.encode_cell({ r: 0, c })];
                    if (cell) cell.s = {
                        font: { bold: true, color: { rgb: "FFFFFF" }, sz: 11 },
                        fill: { fgColor: { rgb: "1A7A3C" } },
                        alignment: { horizontal: "center" }
                    };
                });
                ws['!cols'] = cols.map((k, i) => ({
                    wch: Math.max(k.length, ...rows.map(r => String(Object.values(r)[i] ?? "").length)) + 2
                }));
                XLSX.utils.book_append_sheet(wb, ws, "Daily Bills");

                // Sheet 2: Day summary
                const total = filtered.reduce((s, b) => s + b.total, 0);
                const byPay = {};
                filtered.forEach(b => { byPay[b.paymode] = (byPay[b.paymode] || 0) + b.total; });
                const statsRows = [
                    { "Metric": "Shop Name",          "Value": settings.shopName },
                    { "Metric": "Date",                "Value": selDate },
                    { "Metric": "Total Bills",         "Value": filtered.length },
                    { "Metric": "Total Items Sold",    "Value": filtered.reduce((s, b) => s + b.items.length, 0) },
                    { "Metric": "Total Revenue (INR)", "Value": parseFloat(total.toFixed(2)) },
                    { "Metric": "Avg Bill (INR)",      "Value": parseFloat((total / filtered.length).toFixed(2)) },
                    ...Object.entries(byPay).map(([m, a]) => ({
                        "Metric": m + " Collection (INR)", "Value": parseFloat(a.toFixed(2))
                    }))
                ];
                const ws2 = XLSX.utils.json_to_sheet(statsRows);
                ["A1","B1"].forEach(addr => {
                    if (ws2[addr]) ws2[addr].s = {
                        font: { bold: true, color: { rgb: "FFFFFF" }, sz: 11 },
                        fill: { fgColor: { rgb: "1A7A3C" } }
                    };
                });
                ws2['!cols'] = [{ wch: 30 }, { wch: 22 }];
                XLSX.utils.book_append_sheet(wb, ws2, "Day Summary");

                const fname = "DailyBills_" + selDate.replace(/\//g, "-") + ".xlsx";
                XLSX.writeFile(wb, fname);
                setDownloaded(fname);
                setTimeout(() => setDownloaded(false), 8000);
            }

            const totalRev = filtered.reduce((s, b) => s + b.total, 0);

                    {downloaded && (

        function SalesScreen({ products, settings, currentUser, bills, setBills }) {
            const [billNo] = useState(generateBillNo());

            const [hlIdx, setHlIdx] = useState(-1);
            const itemRef = useRef();
            const dropRef = useRef();

            // No GST applied — netAmt always equals amount
            const liveItems = items.map(i => ({ ...i, netAmt: i.amount, taxType: 'NIL' }));
            const total = liveItems.reduce((s, i) => s + i.amount, 0);
            const discAmt = (total * discPct) / 100;
            const grandTotal = total - discAmt;

            const handleSearch = (val) => {
                setSearch(val); setSelProd(null); setHlIdx(-1);
                if (val.trim().length > 0) {
                    const v = val.toLowerCase();
                    setSugg(products.filter(p => p.name.toLowerCase().includes(v) || (p.nameTamil || "").includes(val) || p.code.toLowerCase().includes(v) || (p.brand || "").toLowerCase().includes(v)).slice(0, 10));
                } else setSugg([]);
            };
            const selectProd = (p) => { setSelProd(p); setSearch(p.name); setRate(p.salePrice.toString()); setSugg([]); setHlIdx(-1); };
            const addItem = () => {
                if (!selProd) return;
                const q = parseFloat(qty) || 0, r = parseFloat(rate) || 0;
                if (q <= 0) return;
                const amt = q * r;
                setItems(prev => {
                    const ei = prev.findIndex(i => i.code === selProd.code);
                    if (ei >= 0) { const u = [...prev]; const nq = u[ei].qty + q; u[ei] = { ...u[ei], qty: nq, amount: nq * r, netAmt: nq * r }; return u; }
                    return [...prev, { slNo: prev.length + 1, code: selProd.code, name: selProd.name, nameTamil: selProd.nameTamil || "", brand: selProd.brand, uom: selProd.uom, qty: q, rate: r, amount: amt, discount: 0, taxType: 'NIL', netAmt: amt }];
                });
                setSearch(""); setQty("1"); setRate("0"); setSelProd(null); setSugg([]);
                itemRef.current && itemRef.current.focus();

            const removeItem = (idx) => setItems(prev => prev.filter((_, i) => i !== idx).map((x, i) => ({ ...x, slNo: i + 1 })));

                if (items.length === 0) return;
                const newBill = { billNo, date: today(), time: timeNow(), customer, mobile, area, paymode, billType, items: liveItems, total: grandTotal, cashier: currentUser.name };
                setBills(prev => [newBill, ...prev]);
                setSaved(true);
            };
            const clearBill = () => { setItems([]); setCustomer(""); setMobile(""); setArea(""); setDiscPct(0); setSaved(false); };

            const buildReceiptHTML = () => {
                if (liveItems.length === 0) return null;
                const fmt  = n => '\u20B9' + (n % 1 === 0 ? n.toFixed(0) : n.toFixed(2));
                const sub  = liveItems.reduce((s,i) => s + i.amount, 0);
                const net  = liveItems.reduce((s,i) => s + i.netAmt, 0);
                const csh  = parseFloat(cashReceived) || 0;
                const chng = csh > 0 ? Math.max(0, csh - net) : 0;
                const rid  = 'RCP' + billNo.slice(-7).toUpperCase();
                const dt   = today();
                const tm   = timeNow();
                const DASH  = '<hr style="border:none;border-top:1px dashed #999;margin:3px 0"/>';
                const THIN  = '<hr style="border:none;border-top:1px solid #000;margin:2px 0"/>';
                const THICK = '<hr style="border:none;border-top:2px solid #000;margin:2px 0"/>';

                return `<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Receipt ${billNo}</title><style>*{box-sizing:border-box;margin:0;padding:0}html,body{background:#fff}body{font-family:'Courier New',Courier,monospace}@page{size:58mm auto;margin:1mm}@media print{html,body{background:#fff!important}*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}}</style></head><body>${body}<script>window.onload=function(){setTimeout(function(){window.print();},600);};<\/script></body></html>`;

        // Tiny SVG barcode renderer — vertical bars from bill number digits
        function Barcode({ value }) {
            const digits = (value || '').replace(/\D/g, '').slice(-8).padStart(8, '0');
            const bars = [];
            let x = 0;
            for (let i = 0; i < digits.length; i++) {
                const w = 1 + parseInt(digits[i]) % 3;
                bars.push(<rect key={i} x={x} y={0} width={w} height={36} fill="#000" />);
                x += w + 1 + parseInt(digits[i]) % 2;
            }
            // add some fixed bars for visual density
            for (let i = 0; i < 28; i++) {
                const w = i % 3 === 0 ? 2 : 1;
                bars.push(<rect key={'f' + i} x={x} y={0} width={w} height={36} fill="#000" />);
                x += w + (i % 2 === 0 ? 2 : 1);
            }
            return (
                <svg width={x} height={40} viewBox={`0 0 ${x} 40`} xmlns="http://www.w3.org/2000/svg">
                    {bars}
                </svg>
            );
        }

        // ─── SMART FUZZY LOOKUP ───────────────────────────────────────────────────────
        // Levenshtein distance — counts how many letter changes between two words
        function levenshtein(a, b) {
            const m = a.length, n = b.length;
            const dp = Array.from({ length: m + 1 }, (_, i) => Array.from({ length: n + 1 }, (_, j) => i === 0 ? j : j === 0 ? i : 0));
            for (let i = 1; i <= m; i++)
                for (let j = 1; j <= n; j++)
                    dp[i][j] = a[i - 1] === b[j - 1] ? dp[i - 1][j - 1] : 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
            return dp[m][n];
        }

        function lookupTamil(name) {
            if (!name || name.trim().length < 2) return null;
            const key = name.trim().toLowerCase();

            // 1. Exact match
            if (TAMIL_DICT[key]) return TAMIL_DICT[key];

            // 2. Starts-with or contains match
            for (const [en, ta] of Object.entries(TAMIL_DICT)) {
                if (key === en || key.startsWith(en) || en.startsWith(key)) return ta;
            }

            // 3. Word-level contains: "red chilli powder" should match "chilli powder"
            for (const [en, ta] of Object.entries(TAMIL_DICT)) {
                if (key.includes(en) || en.includes(key)) return ta;
            }

            // 4. Fuzzy match — allow up to 2 typos for short words, 3 for longer
            let bestMatch = null, bestDist = 999;
            for (const [en, ta] of Object.entries(TAMIL_DICT)) {
                const maxAllowed = en.length <= 5 ? 1 : en.length <= 8 ? 2 : 3;
                // Compare whole key vs whole dict entry
                const d1 = levenshtein(key, en);
                if (d1 <= maxAllowed && d1 < bestDist) { bestDist = d1; bestMatch = ta; }
                // Also compare individual words in key vs dict entry words
                const keyWords = key.split(/\s+/);
                const enWords = en.split(/\s+/);
                for (const kw of keyWords) {
                    for (const ew of enWords) {
                        if (kw.length < 3) continue; // skip tiny words
                        const allowed = kw.length <= 4 ? 1 : 2;
                        const d2 = levenshtein(kw, ew);
                        if (d2 <= allowed && d2 < bestDist) { bestDist = d2; bestMatch = ta; }
                    }
                }
            }
            return bestMatch;
        }

        // ─── STOCK ────────────────────────────────────────────────────────────────────
        function StockScreen({ products, setProducts, stockLog, setStockLog }) {
            const [form, setForm] = useState({ productId: "", qty: "", type: "IN", note: "" });
            const log = stockLog || [];
            const setLog = setStockLog || (() => {});
            const update = () => {
                if (!form.productId || !form.qty) return;
                const qty = parseFloat(form.qty);
                const prod = products.find(p => p.id === parseInt(form.productId));
                setProducts(prev => prev.map(p => p.id === parseInt(form.productId) ? { ...p, stock: Math.max(0, p.stock + (form.type === "IN" ? qty : -qty)) } : p));
                setLog(prev => [{ ...form, productName: prod?.name, productNameTamil: prod?.nameTamil || "", time: new Date().toLocaleTimeString(), qty }, ...prev]);
                setForm({ productId: "", qty: "", type: "IN", note: "" });
            };
            return (
                <div>
                    <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: "10px" }}>
                        <button style={S.btn(C.blue)} onClick={() => exportStockToExcel(products, log)}>📥 Export Stock to Excel</button>
                    </div>
                    <div style={{ display: "flex", gap: "14px", flexWrap: "wrap" }}>
                        <div style={{ ...S.card, minWidth: "340px", maxWidth: "420px" }}>
                            <div style={S.greenHeader()}><span style={{ color: C.white, fontWeight: "700", fontSize: "12px" }}>⚖ Stock Adjustment / சரக்கு சரிசெய்</span></div>
                            <div style={{ marginBottom: "10px" }}>
                                <div style={{ fontSize: "11px", color: C.textMid, marginBottom: "4px", fontWeight: "600" }}>Select Product / பொருள் தேர்வு</div>
                                <select style={{ ...S.select, width: "100%" }} value={form.productId} onChange={e => setForm(f => ({ ...f, productId: e.target.value }))}>
                                    <option value="">-- Select / தேர்வு செய் --</option>
                                    {products.map(p => <option key={p.id} value={p.id}>{p.name}{p.nameTamil ? ` / ${p.nameTamil}` : ""} (Stock: {p.stock} {p.uom})</option>)}
                                </select>
                            </div>
                            <div style={{ display: "flex", gap: "10px", marginBottom: "10px" }}>
                                <div style={{ flex: 1 }}><div style={{ fontSize: "11px", color: C.textMid, marginBottom: "4px", fontWeight: "600" }}>Quantity / அளவு</div><input type="number" style={{ ...S.input, width: "100%" }} value={form.qty} onChange={e => setForm(f => ({ ...f, qty: e.target.value }))} /></div>
                                <div><div style={{ fontSize: "11px", color: C.textMid, marginBottom: "4px", fontWeight: "600" }}>Type</div><select style={S.select} value={form.type} onChange={e => setForm(f => ({ ...f, type: e.target.value }))}><option value="IN">Stock In (+)</option><option value="OUT">Stock Out (−)</option></select></div>
                            </div>
                            <div style={{ marginBottom: "12px" }}><div style={{ fontSize: "11px", color: C.textMid, marginBottom: "4px", fontWeight: "600" }}>Note / குறிப்பு</div><input style={{ ...S.input, width: "100%" }} value={form.note} onChange={e => setForm(f => ({ ...f, note: e.target.value }))} placeholder="e.g. Purchase from supplier" /></div>
                            <button style={S.btn()} onClick={update}>Update Stock / புதுப்பி</button>
                        </div>
                        <div style={{ flex: 1 }}>
                            <div style={S.card}>
                                <div style={{ background: C.red, margin: "-12px -14px 14px", padding: "8px 14px", borderRadius: "3px 3px 0 0" }}><span style={{ color: C.white, fontWeight: "700", fontSize: "12px" }}>⚠ Low Stock Alert / குறைந்த இருப்பு</span></div>
                                {products.length === 0
                                    ? <div style={{ color: C.textLight, fontSize: "12px" }}>⚠ No products in inventory.</div>
                                    : products.filter(p => p.stock <= p.minStock).length === 0
                                    ? <div style={{ color: C.green, fontSize: "12px" }}>✓ All products have sufficient stock.</div>
                                    : products.filter(p => p.stock <= p.minStock).map(p => (
                                        <div key={p.id} style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderBottom: `1px solid ${C.border}`, fontSize: "12px", alignItems: "center" }}>
                                            <span><b>{p.name}</b>{p.nameTamil && <span style={{ color: C.purple, marginLeft: "6px", fontFamily: "'Noto Sans Tamil',Arial,sans-serif" }}>{p.nameTamil}</span>} <span style={{ color: C.textLight }}>({p.brand})</span></span>
                                            <span style={{ color: C.red, fontWeight: "700" }}>Only {p.stock} {p.uom}!</span>
                                        </div>
                                    ))}
                            </div>
                        </div>
                    </div>
                    {log.length > 0 && (
                        <div style={{ ...S.card, padding: 0, overflow: "hidden" }}>
                            <div style={{ background: C.green, padding: "8px 14px" }}><span style={{ color: C.white, fontWeight: "700", fontSize: "12px" }}>📋 Adjustment Log / பதிவு</span></div>
                            <div style={{ overflowX: "auto" }}>
                                <table style={S.table}>
                                    <thead><tr>
                                        <th style={S.th}>Time</th>
                                        <th style={S.th}>Product (EN)</th>
                                        <th style={S.thTamil}>பொருள் (தமிழ்)</th>
                                        <th style={S.th}>Type</th>
                                        <th style={S.th}>Qty</th>
                                        <th style={S.th}>Note</th>
                                    </tr></thead>
                                    <tbody>{log.map((l, i) => {
                                        const td = i % 2 === 0 ? S.td : S.tdAlt; const tdT = i % 2 === 0 ? S.tdTamil : S.tdTamilAlt; return (
                                            <tr key={i}>
                                                <td style={td}>{l.time}</td>
                                                <td style={{ ...td, fontWeight: "700" }}>{l.productName}</td>
                                                <td style={{ ...tdT, fontWeight: "700" }}>{l.productNameTamil || "—"}</td>
                                                <td style={td}><span style={S.badge(l.type === "IN" ? C.green : C.red)}>{l.type === "IN" ? "IN +" : "OUT −"}</span></td>
                                                <td style={td}>{l.qty}</td>
                                                <td style={{ ...td, color: C.textLight }}>{l.note || "—"}</td>
                                            </tr>
                                        );
                                    })}</tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ─── REPORTS ─────────────────────────────────────────────────────────────────
        function ReportsScreen({ bills }) {
            const total = bills.reduce((s, b) => s + b.total, 0);
            const byPay = bills.reduce((acc, b) => { acc[b.paymode] = (acc[b.paymode] || 0) + b.total; return acc; }, {});
            return (
                <div>
                    <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: "10px", gap: "8px" }}>
                        <button style={{ ...S.btn(C.green), fontSize:"11px" }} onClick={() => exportReportsToExcel(bills)}>📊 Export Reports</button>
                        <button style={{ ...S.btn(C.blue), fontSize:"11px" }} onClick={() => exportAllBillsCombined(bills)}>📋 Export All Bills+Items</button>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(170px,1fr))", gap: "10px", marginBottom: "14px" }}>
                        {[["Total Bills", bills.length, C.green], ["Total Revenue", `₹${total.toFixed(2)}`, C.greenDark], ["Avg Bill", `₹${bills.length ? (total / bills.length).toFixed(2) : "0.00"}`, C.blue]].map(([lbl, val, col]) => (
                            <div key={lbl} style={{ ...S.card, marginBottom: 0, borderTop: `4px solid ${col}` }}>
                                <div style={{ fontSize: "10px", color: C.textLight, marginBottom: "4px", textTransform: "uppercase" }}>{lbl}</div>
                                <div style={{ fontSize: "22px", fontWeight: "800", color: col }}>{val}</div>
                            </div>
                        ))}
                        {Object.entries(byPay).map(([mode, amt]) => (
                            <div key={mode} style={{ ...S.card, marginBottom: 0, borderTop: `4px solid ${C.yellow}` }}>
                                <div style={{ fontSize: "10px", color: C.textLight, marginBottom: "4px", textTransform: "uppercase" }}>{mode}</div>
                                <div style={{ fontSize: "20px", fontWeight: "700", color: C.yellow }}>₹{amt.toFixed(2)}</div>
                            </div>
                        ))}
                    </div>
                    <div style={{ ...S.card, padding: 0, overflow: "hidden" }}>
                        <div style={{ background: C.green, padding: "8px 14px" }}><span style={{ color: C.white, fontWeight: "700", fontSize: "12px" }}>📄 Bill History / பில் வரலாறு</span></div>
                        {bills.length === 0 ? <div style={{ padding: "32px", textAlign: "center", color: C.textLight }}>No bills saved yet.</div> : (
                            <div style={{ overflowX: "auto" }}>
                                <table style={S.table}>
                                    <thead><tr>{["Bill No", "Date", "Time", "Customer", "Items", "Pay Mode", "Cashier", "Total"].map(h => <th key={h} style={S.th}>{h}</th>)}</tr></thead>
                                    <tbody>{bills.map((b, i) => {
                                        const td = i % 2 === 0 ? S.td : S.tdAlt; return (
                                            <tr key={i}>
                                                <td style={{ ...td, color: C.yellow, fontWeight: "800" }}>{b.billNo}</td>
                                                <td style={td}>{b.date}</td><td style={td}>{b.time}</td>
                                                <td style={td}>{b.customer || "—"}</td><td style={td}>{b.items.length}</td>
                                                <td style={td}><span style={S.badge(C.blue)}>{b.paymode}</span></td>
                                                <td style={td}>{b.cashier}</td>
                                                <td style={{ ...td, color: C.green, fontWeight: "800" }}>₹{b.total.toFixed(2)}</td>
                                            </tr>
                                        );
                                    })}</tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

                <div style={{ maxWidth: "560px" }}>
                    <div style={{ ...S.card, border: `2px solid ${isSA ? C.green : C.red}` }}>

                            <span style={{ color: C.white, fontWeight: "700", fontSize: "12px" }}>{isSA ? "⚙ Shop Settings — Super Admin" : "🔒 Settings (Read Only)"}</span>

                                <div key={key}><div style={{ fontSize: "11px", color: C.textMid, marginBottom: "4px", fontWeight: "600" }}>{lbl}</div><input style={{ ...S.input, width: "100%", opacity: isSA ? 1 : 0.6 }} disabled={!isSA} value={form[key]} onChange={e => setForm(f => ({ ...f, [key]: e.target.value }))} /></div>
                            ))}
                            <div><div style={{ fontSize: "11px", color: C.textMid, marginBottom: "4px", fontWeight: "600" }}>Default Tax / வரி (%)</div><input type="number" style={{ ...S.input, width: "120px", opacity: isSA ? 1 : 0.6 }} disabled={!isSA} value={form.taxRate} onChange={e => setForm(f => ({ ...f, taxRate: parseFloat(e.target.value) || 0 }))} /></div>
                        </div>
                        {isSA && <div style={{ marginTop: "16px", display: "flex", alignItems: "center", gap: "12px", flexWrap: "wrap" }}>
                            <button style={S.btn()} onClick={save}>{saved ? "✓ Saved!" : "Save Settings"}</button>

                            </span>}
                        </div>}
                    </div>

                    <div style={{ ...S.card, border: "2px solid #fca5a5", marginTop: "16px" }}>
                        <div style={{ background: "#dc2626", margin: "-12px -14px 16px", padding: "8px 14px", borderRadius: "3px 3px 0 0" }}>
                            <span style={{ color: "#fff", fontWeight: "700", fontSize: "12px" }}>🗄️ Data Management / தரவு நிர்வாகம்</span>
                        </div>
                        <div style={{ fontSize: "12px", color: C.textMid, marginBottom: "12px" }}>
                            <span style={{ background: "#dcfce7", color: "#166534", border: "1px solid #86efac", borderRadius: "3px", padding: "2px 8px", fontWeight: "700", marginRight: "8px" }}>✅ AUTO-SAVE ON</span>
                            All data (inventory, bills, stock, settings, users) is automatically saved to this browser. Data persists after refresh.
                        </div>
                        <div style={{ display: "flex", gap: "10px", flexWrap: "wrap" }}>
                            <button style={{ ...S.btn("#dc2626"), fontSize: "11px" }} onClick={() => {
                                if (window.confirm("⚠️ Delete ALL Bills? This cannot be undone!\n\nஅனைத்து பில்களையும் நீக்கவா?")) {
                                    localStorage.removeItem('vsp_bills');
                                    localStorage.removeItem('vsp_bill_count');
                                    alert("✅ All bills cleared. Page will reload.");
                                    window.location.reload();
                                }
                            }}>🗑 Clear All Bills</button>
                            <button style={{ ...S.btn("#92400e"), fontSize: "11px" }} onClick={() => {
                                if (window.confirm("⚠️ Reset Inventory to sample data? All product changes will be lost!\n\nமாதிரி தயாரிப்புகளுக்கு மீட்டமைக்கவா?")) {
                                    localStorage.removeItem('vsp_products');
                                    alert("✅ Inventory reset. Page will reload.");
                                    window.location.reload();
                                }
                            }}>🔄 Reset Inventory</button>
                            <button style={{ ...S.btn("#7c3aed"), fontSize: "11px" }} onClick={() => {
                                if (window.confirm("⚠️ Reset ALL data (bills, inventory, stock, settings, users) to factory defaults?\n\nALL DATA WILL BE LOST!\n\nஅனைத்தையும் மீட்டமைக்கவா?")) {
                                    ['vsp_bills','vsp_products','vsp_stocklog','vsp_settings','vsp_bill_count'].forEach(k => localStorage.removeItem(k));
                                    localStorage.setItem('vsp_users', JSON.stringify([SUPER_ADMIN_USER]));
                                    alert("✅ All data cleared. Page will reload and show first-time setup.");
                                    window.location.reload();
                                }
                            }}>⚠️ Factory Reset All</button>
                        </div>
                    </div>
                    )}
                </div>
            );
        }

        // ─── PROFILES ────────────────────────────────────────────────────────────────
        function ProfilesScreen({ users, setUsers, currentUser }) {
            const isSA = currentUser.role === "superadmin";
            const [showForm, setShowForm] = useState(false);
            const [form, setForm] = useState({ name: "", username: "", password: "", confirmPassword: "", role: "cashier", email: "" });
            const [formErr, setFormErr] = useState("");
            const ROLES = isSA ? ["admin", "cashier"] : ["cashier"];
            const roleColor = { superadmin: C.yellow, admin: C.green, cashier: C.blue };
            const addUser = () => {
                if (!form.name.trim() || !form.username.trim()) { setFormErr("Name and Username are required."); return; }
                if (form.username.trim().toLowerCase() === "devdraft") { setFormErr("That username is reserved."); return; }
                if (form.password.length < 4) { setFormErr("Password must be at least 4 characters."); return; }
                if (form.password !== form.confirmPassword) { setFormErr("Passwords do not match."); return; }
                const duplicate = users.find(u => u.username.toLowerCase() === form.username.trim().toLowerCase());
                if (duplicate) { setFormErr("Username already exists. Choose a different one."); return; }
                setFormErr("");
                setUsers(prev => [...prev, { name: form.name.trim(), username: form.username.trim(), password: form.password, role: form.role, email: form.email.trim(), id: Date.now(), active: true }]);
                setShowForm(false);
                setForm({ name: "", username: "", password: "", confirmPassword: "", role: "cashier", email: "" });
            };
            return (
                <div>
                    <div style={{ display: "flex", gap: "10px", marginBottom: "12px" }}><button style={S.btn()} onClick={() => { setShowForm(!showForm); setFormErr(""); }}>+ Add User / + பயனர்</button></div>
                    {showForm && (
                        <div style={{ ...S.card, border: `2px solid ${C.green}`, marginBottom: "12px" }}>
                            <div style={S.greenHeader()}><span style={{ color: C.white, fontWeight: "700", fontSize: "12px" }}>+ New User / புதிய பயனர்</span></div>
                            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(200px,1fr))", gap: "12px" }}>
                                {[["Full Name *", "name", "text"], ["Username *", "username", "text"], ["Password * (min 4)", "password", "password"], ["Confirm Password *", "confirmPassword", "password"], ["Email", "email", "email"]].map(([lbl, key, type]) => (
                                    <div key={key}><div style={{ fontSize: "11px", color: C.textMid, marginBottom: "4px", fontWeight: "600" }}>{lbl}</div><input type={type} style={{ ...S.input, width: "100%" }} value={form[key]} onChange={e => setForm(f => ({ ...f, [key]: e.target.value }))} /></div>
                                ))}
                                <div><div style={{ fontSize: "11px", color: C.textMid, marginBottom: "4px", fontWeight: "600" }}>Role</div><select style={{ ...S.select, width: "100%" }} value={form.role} onChange={e => setForm(f => ({ ...f, role: e.target.value }))}>{ROLES.map(r => <option key={r}>{r}</option>)}</select></div>
                            </div>
                            {formErr && <div style={{ background: "#fee2e2", border: "1px solid #fca5a5", borderRadius: "4px", padding: "8px 12px", fontSize: "12px", color: C.red, marginTop: "10px" }}>⚠ {formErr}</div>}
                            <div style={{ display: "flex", gap: "8px", marginTop: "14px" }}><button style={S.btn()} onClick={addUser}>Save / சேமி</button><button style={S.btnOutline} onClick={() => { setShowForm(false); setFormErr(""); }}>Cancel</button></div>
                        </div>
                    )}
                    <div style={{ ...S.card, padding: 0, overflow: "hidden" }}>
                        <div style={{ background: C.green, padding: "8px 14px" }}><span style={{ color: C.white, fontWeight: "700", fontSize: "12px" }}>👥 User Accounts / பயனர்கள்</span></div>
                        <table style={S.table}>
                            <thead><tr>{["Name", "Username", "Email", "Role", "Status", "Actions"].map(h => <th key={h} style={S.th}>{h}</th>)}</tr></thead>
                            <tbody>{users.map((u, i) => {
                                const td = i % 2 === 0 ? S.td : S.tdAlt;
                                const isSuperAdmin = u.role === "superadmin";
                                return (
                                    <tr key={u.id}>
                                        <td style={{ ...td, fontWeight: "700" }}>{u.name}{u.id === currentUser.id && <span style={{ fontSize: "10px", color: C.green }}> (You)</span>}{isSuperAdmin && <span style={{ fontSize: "10px", color: C.yellow }}> 🔒</span>}</td>
                                        <td style={td}>{u.username}</td><td style={td}>{u.email}</td>
                                        <td style={td}><span style={S.badge(roleColor[u.role] || C.textLight)}>{u.role.toUpperCase()}</span></td>
                                        <td style={td}><span style={S.badge(u.active ? C.green : C.red)}>{u.active ? "ACTIVE" : "INACTIVE"}</span></td>
                                        <td style={td}>{isSA && !isSuperAdmin && u.id !== currentUser.id && (
                                            <div style={{ display: "flex", gap: "4px" }}>
                                                <button onClick={() => setUsers(prev => prev.map(x => x.id === u.id ? { ...x, active: !x.active } : x))} style={{ ...S.btn(u.active ? "#92400e" : "#166534"), padding: "3px 10px", fontSize: "11px" }}>{u.active ? "Disable" : "Enable"}</button>
                                                <button onClick={() => { if (window.confirm("Delete this user?")) setUsers(prev => prev.filter(x => x.id !== u.id)) }} style={{ ...S.btn(C.red), padding: "3px 10px", fontSize: "11px" }}>Del</button>
                                            </div>
                                        )}{isSuperAdmin && <span style={{ fontSize: "11px", color: C.textLight }}>Protected</span>}</td>
                                    </tr>
                                );
                            })}</tbody>
                        </table>
                    </div>
                </div>
            );
        }
            return (
                <div>
                    <div style={{ display: "flex", gap: "10px", marginBottom: "12px" }}><button style={S.btn()} onClick={() => setShowForm(!showForm)}>+ Add User / + பயனர்</button></div>
                    {showForm && (
                        <div style={{ ...S.card, border: `2px solid ${C.green}`, marginBottom: "12px" }}>
                            <div style={S.greenHeader()}><span style={{ color: C.white, fontWeight: "700", fontSize: "12px" }}>+ New User / புதிய பயனர்</span></div>
                            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(200px,1fr))", gap: "12px" }}>
                                {[["Full Name", "name", "text"], ["Username", "username", "text"], ["Password", "password", "password"], ["Email", "email", "email"]].map(([lbl, key, type]) => (
                                    <div key={key}><div style={{ fontSize: "11px", color: C.textMid, marginBottom: "4px", fontWeight: "600" }}>{lbl}</div><input type={type} style={{ ...S.input, width: "100%" }} value={form[key]} onChange={e => setForm(f => ({ ...f, [key]: e.target.value }))} /></div>
                                ))}
                                <div><div style={{ fontSize: "11px", color: C.textMid, marginBottom: "4px", fontWeight: "600" }}>Role</div><select style={{ ...S.select, width: "100%" }} value={form.role} onChange={e => setForm(f => ({ ...f, role: e.target.value }))}>{ROLES.map(r => <option key={r}>{r}</option>)}</select></div>
                            </div>
                            <div style={{ display: "flex", gap: "8px", marginTop: "14px" }}><button style={S.btn()} onClick={addUser}>Save / சேமி</button><button style={S.btnOutline} onClick={() => setShowForm(false)}>Cancel</button></div>
                        </div>
                    )}
                    <div style={{ ...S.card, padding: 0, overflow: "hidden" }}>
                        <div style={{ background: C.green, padding: "8px 14px" }}><span style={{ color: C.white, fontWeight: "700", fontSize: "12px" }}>👥 User Accounts / பயனர்கள்</span></div>
                        <table style={S.table}>
                            <thead><tr>{["Name", "Username", "Email", "Role", "Status", "Actions"].map(h => <th key={h} style={S.th}>{h}</th>)}</tr></thead>
                            <tbody>{users.map((u, i) => {
                                const td = i % 2 === 0 ? S.td : S.tdAlt; return (
                                    <tr key={u.id}>
                                        <td style={{ ...td, fontWeight: "700" }}>{u.name}{u.id === currentUser.id && <span style={{ fontSize: "10px", color: C.green }}> (You)</span>}</td>
                                        <td style={td}>{u.username}</td><td style={td}>{u.email}</td>
                                        <td style={td}><span style={S.badge(roleColor[u.role] || C.textLight)}>{u.role.toUpperCase()}</span></td>
                                        <td style={td}><span style={S.badge(u.active ? C.green : C.red)}>{u.active ? "ACTIVE" : "INACTIVE"}</span></td>
                                        <td style={td}>{isSA && u.id !== currentUser.id && (
                                            <div style={{ display: "flex", gap: "4px" }}>
                                                <button onClick={() => setUsers(prev => prev.map(x => x.id === u.id ? { ...x, active: !x.active } : x))} style={{ ...S.btn(u.active ? "#92400e" : "#166534"), padding: "3px 10px", fontSize: "11px" }}>{u.active ? "Disable" : "Enable"}</button>
                                                <button onClick={() => { if (window.confirm("Delete?")) setUsers(prev => prev.filter(x => x.id !== u.id)) }} style={{ ...S.btn(C.red), padding: "3px 10px", fontSize: "11px" }}>Del</button>
                                            </div>
                                        )}</td>
                                    </tr>
                                );
                            })}</tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // ─── MAIN APP ─────────────────────────────────────────────────────────────────
        // ─── localStorage helpers ─────────────────────────────────────────────────
        function lsGet(key, fallback) {
            try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch(e) { return fallback; }
        }
        function lsSet(key, val) {
            try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
        }

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [view, setView] = useState("sales");
            const [products, setProducts] = useState(() => lsGet('vsp_products', SAMPLE_PRODUCTS));
            const [bills, setBills] = useState(() => lsGet('vsp_bills', []));
            const [stockLog, setStockLog] = useState(() => lsGet('vsp_stocklog', []));
            const [settings, setSettings] = useState(() => lsGet('vsp_settings', INITIAL_SETTINGS));
            const [users, setUsers] = useState(() => {
                let stored = lsGet('vsp_users', null);
                if (!stored || !Array.isArray(stored) || stored.length === 0) return [SUPER_ADMIN_USER];
                const others = stored.filter(u => u.role !== "superadmin");
                return [SUPER_ADMIN_USER, ...others];
            });
            const [clock, setClock] = useState(timeNow());
            const [saveIndicator, setSaveIndicator] = useState('');

            // ── Auto-save every change (skip initial mount) ────────────────────────
            const mountedRef = useRef(false);
            function showSaved(label) {
                setSaveIndicator('✅ ' + label + ' saved');
                setTimeout(() => setSaveIndicator(''), 2500);
            }
            useEffect(() => {
                if (!mountedRef.current) return;
                lsSet('vsp_products', products);
                showSaved('Inventory');
            }, [products]);
            useEffect(() => {
                if (!mountedRef.current) return;
                lsSet('vsp_bills', bills);
                if (bills.length > 0) showSaved('Bills');
            }, [bills]);
            useEffect(() => {
                if (!mountedRef.current) return;
                lsSet('vsp_stocklog', stockLog);
                if (stockLog.length > 0) showSaved('Stock log');
            }, [stockLog]);
            useEffect(() => {
                if (!mountedRef.current) return;
                lsSet('vsp_settings', settings);
                showSaved('Settings');
            }, [settings]);
            useEffect(() => {
                if (!mountedRef.current) return;
                lsSet('vsp_users', users);
                showSaved('Users');
            }, [users]);
            // Mark as mounted after first render — all above effects now only fire on real changes
            useEffect(() => {
                mountedRef.current = true;
                lsSet('vsp_users', users);
            }, []);

            useEffect(() => { const t = setInterval(() => setClock(timeNow()), 30000); return () => clearInterval(t); }, []);

            // Safe users setter — always keeps Super Admin locked
            const setUsersSafe = (updater) => {
                setUsers(prev => {
                    const next = typeof updater === 'function' ? updater(prev) : updater;
                    const others = next.filter(u => u.role !== "superadmin");
                    return [SUPER_ADMIN_USER, ...others];
                });
            };

            // First-run: no admin/cashier users exist yet — show setup screen
            const nonSuperAdminUsers = users.filter(u => u.role !== "superadmin");
            if (!currentUser && nonSuperAdminUsers.length === 0) {
                return <FirstRunSetup onComplete={(newUsers) => { setUsersSafe(() => newUsers); }} />;
            }

            if (!currentUser) return <LoginPage users={users} settings={settings} onLogin={setCurrentUser} />;

            const canAccess = (v) => {
                if (currentUser.role === "superadmin") return true;
                if (currentUser.role === "admin") return v !== "profiles";
                if (v === "excel") return false;
                if (v === "dailybills") return true;
                return v === "sales";
            };
            const navItems = [
                { key: "sales", label: "Sales / விற்பனை" },
                { key: "inventory", label: "Inventory / சரக்கு" },
                { key: "stock", label: "Stock / இருப்பு" },
                { key: "reports", label: "Reports / அறிக்கை" },
                { key: "dailybills", label: "📋 Daily Bills" },
                { key: "excel", label: "📊 Excel Export" },
                { key: "settings", label: "Settings / அமைப்பு" },
                { key: "profiles", label: "Users / பயனர்" },
            ];
            const titles = {
                sales: "Sales & Billing / விற்பனை & பில்லிங்",
                inventory: "Product Inventory / தயாரிப்பு சரக்கு",
                stock: "Stock Management / இருப்பு மேலாண்மை",
                reports: "Reports / அறிக்கைகள்",
                dailybills: "Daily Bills / தினசரி பில்கள்",
                excel: "Excel Export Manager / எக்செல் ஏற்றுமதி மேலாளர்",
                settings: "Settings / அமைப்புகள்",
                profiles: "User Management / பயனர் மேலாண்மை",
            };

            return (
                <div style={S.app}>
                    {/* Top Bar */}
                    <div style={{ ...S.topBar }} className="no-print">
                        <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
                            <div style={{ width: "32px", height: "32px", background: "rgba(255,255,255,0.2)", borderRadius: "6px", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: "900", fontSize: "18px", color: C.white }}>₹</div>
                            <div>
                                <div style={{ fontSize: "15px", fontWeight: "900", color: C.white, letterSpacing: "2px" }}>Dev Draft</div>
                                <div style={{ fontSize: "9px", color: "rgba(255,255,255,0.7)", letterSpacing: "1px" }}>GROCERY POS</div>
                            </div>
                            <div style={{ width: "1px", height: "28px", background: "rgba(255,255,255,0.25)", margin: "0 10px" }} />
                            <div>
                                <div style={{ fontSize: "13px", fontWeight: "700", color: C.white }}>{settings.shopName}</div>
                                <div style={{ fontSize: "10px", color: "rgba(255,255,255,0.7)" }}>Head Office · {today()}</div>
                            </div>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: "14px" }}>
                            <div style={{ textAlign: "right" }}>
                                <div style={{ fontSize: "15px", fontWeight: "700", color: C.white }}>{clock}</div>
                                <div style={{ fontSize: "10px", color: "rgba(255,255,255,0.7)" }}>{currentUser.name} · {currentUser.role.toUpperCase()}</div>
                            </div>
                            <button onClick={() => setCurrentUser(null)} style={{ background: "rgba(255,255,255,0.15)", color: C.white, border: "1px solid rgba(255,255,255,0.3)", borderRadius: "3px", padding: "5px 12px", fontSize: "11px", cursor: "pointer", fontWeight: "600" }}>Logout</button>
                        </div>
                    </div>

                    {/* Nav */}
                    <div style={S.nav} className="no-print">
                        {navItems.filter(n => canAccess(n.key)).map(n => (
                            <button key={n.key} style={S.navBtn(view === n.key)} onClick={() => setView(n.key)}
                                onMouseOver={e => { if (view !== n.key) e.currentTarget.style.background = "rgba(255,255,255,0.15)"; }}
                                onMouseOut={e => { if (view !== n.key) e.currentTarget.style.background = "transparent"; }}>
                                {n.label}
                            </button>
                        ))}
                        <div style={{ flex: 1 }} />
                        <div style={{ display: "flex", alignItems: "center", padding: "0 14px", gap: "8px" }}>
                            <span style={{ background: "rgba(255,255,255,0.2)", color: C.white, borderRadius: "3px", padding: "2px 8px", fontSize: "10px", fontWeight: "700" }}>{products.length} Products</span>
                            <span style={{ background: "rgba(255,255,255,0.2)", color: C.white, borderRadius: "3px", padding: "2px 8px", fontSize: "10px", fontWeight: "700" }}>{bills.length} Bills</span>
                        </div>
                    </div>

                    {/* Breadcrumb */}
                    <div style={{ background: C.white, borderBottom: `1px solid ${C.border}`, padding: "5px 14px", display: "flex", alignItems: "center", gap: "8px" }} className="no-print">
                        <span style={{ fontSize: "10px", color: C.textLight }}>Home</span>
                        <span style={{ fontSize: "10px", color: C.textLight }}>›</span>
                        <span style={{ fontSize: "11px", fontWeight: "700", color: C.green }}>{titles[view]}</span>
                        <div style={{ flex: 1 }} />
                        <span style={{ background: "#f3e8ff", color: C.purple, border: "1px solid #d8b4fe", borderRadius: "3px", padding: "1px 7px", fontSize: "10px", fontFamily: "'Noto Sans Tamil',Arial,sans-serif", fontWeight: "700" }}>தமிழ் + English</span>
                        <span style={{ fontSize: "10px", color: C.textLight }}>|</span>
                        <span style={{ fontSize: "10px", color: C.textLight }}>GST: {settings.gstNo}</span>
                    </div>

                    {/* Content */}
                    <div style={{ flex: 1, overflow: "auto", display: "flex" }}>
                        <div style={S.panel}>
                            {view === "sales" && <SalesScreen products={products} settings={settings} currentUser={currentUser} bills={bills} setBills={setBills} />}
                            {view === "inventory" && <InventoryScreen products={products} setProducts={setProducts} settings={settings} />}
                            {view === "stock" && <StockScreen products={products} setProducts={setProducts} stockLog={stockLog} setStockLog={setStockLog} />}
                            {view === "reports" && <ReportsScreen bills={bills} />}
                            {view === "dailybills" && <DailyBillsScreen bills={bills} settings={settings} />}
                            {view === "excel" && <ExcelManagerScreen bills={bills} products={products} stockLog={stockLog} />}
                            {view === "settings" && <SettingsScreen settings={settings} setSettings={setSettings} currentUser={currentUser} />}
                            {view === "profiles" && <ProfilesScreen users={users} setUsers={setUsersSafe} currentUser={currentUser} />}
                        </div>
                    </div>

                    {/* Status Bar */}
                    <div style={{ background: C.greenDark, padding: "4px 14px", display: "flex", gap: "20px", fontSize: "10px", color: "rgba(255,255,255,0.8)", alignItems: "center" }} className="no-print">
                        <span style={{ color: C.white, fontWeight: "700" }}>Dev Draft v1.0</span>
                        <span style={{ color: "#86efac" }}>● Auto-Save ON</span>
                        <span style={{ fontFamily: "'Noto Sans Tamil',Arial,sans-serif", color: "rgba(255,255,255,0.7)" }}>தமிழ் + English ஆதரவு</span>
                        {saveIndicator && (
                            <span style={{ background: "rgba(134,239,172,0.25)", color: "#86efac", border: "1px solid rgba(134,239,172,0.4)", borderRadius: "3px", padding: "1px 8px", fontWeight: "700", fontSize: "10px" }}>
                                {saveIndicator}
                            </span>
                        )}
                        <div style={{ flex: 1 }} />
                        <span>Head Store: {settings.shopName}</span>
                    </div>
                </div>
            );
        }

        // ─── RENDER ───────────────────────────────────────────────────────────────────
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>

</html>
